name: Deploy ERP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          port: 22
          script: |
            echo "📂 Switching to bench directory..."
            cd /srv/apps/erp/backend/rolaface-izayne-bench

            echo "🔌 Running as frappe user..."
            su - frappe -c "
              cd /srv/apps/erp/backend/rolaface-izayne-bench

              # Load nvm and switch to Node 24
              export NVM_DIR=~/.nvm
              [ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\"
              nvm use 24

              # Activate virtual environment
              source env/bin/activate

              echo '📦 Backup...'
              bench --site api.erp.udvell.rolaface.com backup

              echo '⬇️ Pull latest code...'
              cd apps/custom_api && git pull origin main

              echo '⚙️ Run migrations...'
              cd .. && bench --site api.erp.udvell.rolaface.com migrate

              echo '🎨 Build assets...'
              npx update-browserslist-db@latest --yes
              bench build

              echo '🧹 Clear cache...'
              bench --site api.erp.udvell.rolaface.com clear-cache
            "

            echo "🔄 Restarting services..."
            supervisorctl restart frappe: